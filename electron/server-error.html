<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { max-width: 400px; padding: 20px; }
        h1 { font-size: 1.3em; color: #c66; margin-bottom: 12px; }
        p { font-size: 0.9em; color: #999; line-height: 1.5; margin-bottom: 16px; }
        code { background: #2a2a2a; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Server failed to start</h1>
        <p>The embedded server didn't respond in time. Check the terminal output for errors.</p>
        <p>Open <code>File &gt; Settings</code> to review your configuration, or check the logs in the terminal where you launched the app.</p>
    </div>
</body>
</html>
